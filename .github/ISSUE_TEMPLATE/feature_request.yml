name: Feature request
description: Suggest an idea or improvement
title: '[feat] '
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Share context so maintainers can evaluate fit and scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or developer pain does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this (subject to maintainer review)
          required: false
