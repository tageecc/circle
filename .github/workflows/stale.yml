name: Stale

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been marked stale because it has had no activity for 60 days.
            It will close in 14 days unless there is new activity.
          stale-pr-message: >
            This pull request has been marked stale because it has had no activity for 60 days.
            It will close in 14 days unless there is new activity.
          exempt-issue-labels: security, pinned, roadmap
          exempt-pr-labels: security, pinned, work-in-progress
          operations-per-run: 60
