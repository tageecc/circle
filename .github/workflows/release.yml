name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish or refresh (for example: v1.0.2)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_globs: |
              dist/*.AppImage
              dist/*.AppImage.blockmap
              dist/*.deb
          - os: macos-latest
            platform: mac
            artifact_globs: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            platform: win
            artifact_globs: |
              dist/*-setup.exe
              dist/*.exe.blockmap
              dist/latest*.yml
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build application sources
        run: pnpm run build

      - name: Write App Store Connect API key (.p8)
        if: matrix.platform == 'mac' && vars.APPLE_SIGNING == 'true'
        run: |
          echo "$APPLE_API_KEY_P8" > "${{ runner.temp }}/AuthKey.p8"
          chmod 600 "${{ runner.temp }}/AuthKey.p8"
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY }}

      - name: Package application
        if: matrix.platform != 'mac' || vars.APPLE_SIGNING != 'true'
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish never

      - name: Build application (macOS, Developer ID + notarize)
        if: matrix.platform == 'mac' && vars.APPLE_SIGNING == 'true'
        run: pnpm exec electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: ${{ matrix.artifact_globs }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="${RELEASE_TAG#v}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$title" --latest
          else
            gh release create "$RELEASE_TAG" --verify-tag --title "$title" --generate-notes --latest
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
