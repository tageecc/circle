name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish or refresh (for example: v1.0.2)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  GH_REPO: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_globs: |
              dist/*.AppImage
              dist/*.AppImage.blockmap
              dist/*.deb
          - os: macos-latest
            platform: mac
            artifact_globs: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            platform: win
            artifact_globs: |
              dist/*-setup.exe
              dist/*.exe.blockmap
              dist/latest*.yml
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build application sources
        run: pnpm run build

      - name: Write App Store Connect API key (.p8)
        if: matrix.platform == 'mac' && vars.APPLE_SIGNING == 'true'
        run: |
          echo "$APPLE_API_KEY_P8" > "${{ runner.temp }}/AuthKey.p8"
          chmod 600 "${{ runner.temp }}/AuthKey.p8"
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY }}

      - name: Validate mac signing configuration
        if: matrix.platform == 'mac'
        shell: bash
        env:
          APPLE_SIGNING: ${{ vars.APPLE_SIGNING }}
          MAC_CERTS_P12: ${{ secrets.MAC_CERTS_P12 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          [ "$APPLE_SIGNING" = "true" ] || {
            echo "::error::APPLE_SIGNING must be true for public macOS releases"
            exit 1
          }

          for required in MAC_CERTS_P12 MAC_CERTS_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing required macOS signing secret: $required"
              exit 1
            fi
          done

      - name: Package application
        if: matrix.platform != 'mac' || vars.APPLE_SIGNING != 'true'
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish never

      - name: Build application (macOS, Developer ID + notarize)
        if: matrix.platform == 'mac' && vars.APPLE_SIGNING == 'true'
        run: pnpm exec electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Verify notarized macOS artifacts
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find dist -maxdepth 2 -path '*/Circle.app' -print -quit)"
          dmg_path="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$app_path" ] || [ -z "$dmg_path" ]; then
            echo "::error::Expected signed Circle.app and dmg artifact"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet >/dev/null 2>&1 || true
            rmdir "$mount_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse -quiet
          mounted_app="$mount_dir/Circle.app"
          [ -d "$mounted_app" ] || {
            echo "::error::Mounted dmg does not contain Circle.app"
            exit 1
          }

          codesign --verify --deep --strict --verbose=2 "$mounted_app"
          spctl --assess --type execute --verbose=4 "$mounted_app"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: ${{ matrix.artifact_globs }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="${RELEASE_TAG#v}"
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$GH_REPO" --title "$title" --latest
          else
            gh release create "$RELEASE_TAG" --repo "$GH_REPO" --verify-tag --title "$title" --generate-notes --latest
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" --repo "$GH_REPO" "${files[@]}" --clobber
